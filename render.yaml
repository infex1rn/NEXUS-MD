# Render Blueprint for NEXUS-MD WhatsApp Bot
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexus-md-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OWNERS
        sync: false
      - key: BOTNAME
        value: NEXUS-MD
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      # FIREBASE_DATABASE_URL is optional - only needed if using Realtime Database
      - key: OPENAI_API_KEY
        sync: false
