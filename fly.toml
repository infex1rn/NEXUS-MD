# fly.toml app configuration file generated for nexus-md-bot
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "nexus-md"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  PORT = "3000"
  BOTNAME = "NEXUS-MD"
  NODE_ENV = "production"
